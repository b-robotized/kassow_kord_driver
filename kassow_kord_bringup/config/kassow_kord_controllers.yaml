    type: joint_trajectory_controller/JointTrajectoryController
    update_rate: 250  # Hz
    joints:
      - kassow_right_joint_1
      - kassow_right_joint_2
      - kassow_right_joint_3
      - kassow_right_joint_4
      - kassow_right_joint_5
      - kassow_right_joint_6
